<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Start Prøven</title>
    <link rel="stylesheet" href="../../css/shared.css" />
    <link rel="stylesheet" href="exam-start.css" />
  </head>
  <body>
    <main class="gate" data-state="idle">
      <a class="gate__back" href="/">← Tilbage til arkivet</a>

      <div class="gate__overline">
        <svg
          class="gate__icon"
          viewBox="0 0 24 24"
          aria-hidden="true"
          focusable="false"
        >
          <polygon points="12,2 22,21 2,21" fill="#ff4d00" />
          <rect x="11" y="9" width="2" height="6" fill="#ffffff" />
          <rect x="11" y="17" width="2" height="2" fill="#ffffff" />
        </svg>
        <span class="gate__eyebrow">Vigtig besked</span>
      </div>

      <h1 class="gate__title">Vent venligst</h1>

      <p class="gate__body">
        Du må ikke starte prøven, før din lærer har givet tilladelse til det.
        Når du trykker på &bdquo;Start Prøven&ldquo;, vil prøven begynde. Sørg
        for at du er klar og har alt det nødvendige udstyr.
      </p>

      <div class="gate__action">
        <button type="button" class="gate__button">Start Prøven</button>
        <div class="gate__panel" role="group" aria-label="Bekræft start">
          <span class="gate__panel-prompt">Er du sikker?</span>
          <button type="button" class="gate__panel-btn gate__panel-btn--cancel">
            Annullér
          </button>
          <button type="button" class="gate__panel-btn gate__panel-btn--confirm">
            Ja, start
          </button>
        </div>
      </div>
    </main>

    <script type="module" src="exam-start.js"></script>
  </body>
</html>
